<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout Signal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/static/app.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .tab-active  { @apply border-b-2 border-indigo-500 text-indigo-600 font-semibold; }
    .status-dot  { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green   { background: #22c55e; }
    .dot-red     { background: #ef4444; }
    .dot-yellow  { background: #f59e0b; }
    .dot-grey    { background: #9ca3af; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen" x-data="app()" x-init="init()" x-cloak>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xl font-bold text-indigo-600">📈 Breakout Signal</span>
        <span class="text-xs text-gray-400 ml-2" x-text="'SET · ' + today"></span>
      </div>
      <div class="flex items-center gap-3 text-xs text-gray-500">
        <span :class="schedulerRunning ? 'dot-green' : 'dot-red'" class="status-dot"></span>
        <span x-text="schedulerRunning ? 'Scheduler running' : 'Scheduler stopped'"></span>
        <button @click="refreshAll()"
          class="ml-2 px-2 py-1 rounded bg-indigo-50 hover:bg-indigo-100 text-indigo-600 transition">
          ↻ Refresh
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="max-w-5xl mx-auto px-4 flex gap-6 text-sm text-gray-500">
      <button @click="tab='dashboard'"
        :class="tab === 'dashboard' ? 'tab-active' : 'hover:text-gray-700'"
        class="pb-2 pt-1 transition">Dashboard</button>
      <button @click="tab='portfolio'; loadPortfolio()"
        :class="tab === 'portfolio' ? 'tab-active' : 'hover:text-gray-700'"
        class="pb-2 pt-1 transition">Paper Trade</button>
      <button @click="tab='signals'; loadSignals()"
        :class="tab === 'signals' ? 'tab-active' : 'hover:text-gray-700'"
        class="pb-2 pt-1 transition">Signals</button>
      <button @click="tab='backtest'; loadBacktest()"
        :class="tab === 'backtest' ? 'tab-active' : 'hover:text-gray-700'"
        class="pb-2 pt-1 transition">Backtest</button>
      <button @click="tab='watchlist'; loadWatchlistDetail()"
        :class="tab === 'watchlist' ? 'tab-active' : 'hover:text-gray-700'"
        class="pb-2 pt-1 transition">Watchlist</button>
      <button @click="tab='chart'"
        :class="tab === 'chart' ? 'tab-active' : 'hover:text-gray-700'"
        class="pb-2 pt-1 transition">Chart</button>
    </div>
  </header>

  <!-- ── Chart tab (full-bleed, outside main container) ─────────────────── -->
  <div x-show="tab === 'chart'" style="height: calc(100vh - 88px)">
    <iframe src="/chart" class="w-full h-full border-0 block"
      x-on:load="$el.style.opacity=1" style="opacity:0; transition: opacity .2s">
    </iframe>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main x-show="tab !== 'chart'" class="max-w-5xl mx-auto px-4 py-6">

    <!-- Toast ──────────────────────────────────────────────────────────── -->
    <div x-show="toast.msg"
      :class="toast.ok ? 'bg-green-50 border-green-300 text-green-700' : 'bg-red-50 border-red-300 text-red-700'"
      class="fixed top-16 right-4 z-50 px-4 py-2 rounded border text-xs shadow transition"
      x-text="toast.msg"></div>

    <!-- ── DASHBOARD TAB ────────────────────────────────────────────────── -->
    <div x-show="tab === 'dashboard'">

      <!-- Job summary cards -->
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        Scheduled jobs
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <template x-for="job in jobSummary" :key="job.name">
          <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
            <div class="flex items-center justify-between mb-1">
              <span class="font-medium text-sm" x-text="job.label"></span>
              <span :class="job.statusClass" class="status-dot ml-1"></span>
            </div>
            <div class="text-xs text-gray-500 space-y-0.5">
              <div>Last: <span class="text-gray-700" x-text="job.lastRun"></span></div>
              <div>Duration: <span class="text-gray-700" x-text="job.duration"></span></div>
              <div>Next: <span class="text-gray-700" x-text="job.nextRun"></span></div>
            </div>
            <div x-show="job.error"
              class="mt-2 text-xs text-red-600 bg-red-50 rounded p-1 truncate"
              x-text="job.error"></div>
            <button @click="runJob(job.name)"
              :disabled="job.running"
              class="mt-3 w-full text-xs px-2 py-1 rounded bg-indigo-50 hover:bg-indigo-100 text-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition"
              x-text="job.running ? 'Running…' : 'Run now'"></button>
          </div>
        </template>
      </div>

      <!-- Recent job history table -->
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        Recent runs
      </h2>
      <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
        <table class="w-full text-xs">
          <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-2 text-left">Job</th>
              <th class="px-4 py-2 text-left">Started (BKK)</th>
              <th class="px-4 py-2 text-center">Status</th>
              <th class="px-4 py-2 text-right">Duration</th>
              <th class="px-4 py-2 text-right">Signals</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <template x-if="recentRuns.length === 0">
              <tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">
                No runs recorded yet
              </td></tr>
            </template>
            <template x-for="run in recentRuns" :key="run.id">
              <tr class="hover:bg-gray-50 transition">
                <td class="px-4 py-2 font-medium" x-text="run.job_name"></td>
                <td class="px-4 py-2 text-gray-500" x-text="fmtDatetime(run.started_at)"></td>
                <td class="px-4 py-2 text-center">
                  <span :class="statusBadge(run.status)"
                    class="px-2 py-0.5 rounded-full text-xs font-medium"
                    x-text="run.status"></span>
                </td>
                <td class="px-4 py-2 text-right text-gray-500"
                  x-text="run.duration_s != null ? run.duration_s.toFixed(1) + 's' : '—'"></td>
                <td class="px-4 py-2 text-right text-gray-500"
                  x-text="run.signals_found != null ? run.signals_found : '—'"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- ── EOD Breakout signals ──────────────────────────────────────── -->
      <template x-if="scanLatest && (scanLatest.signals || []).length > 0">
        <div class="mt-6">
          <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
            EOD Breakout signals
            <span class="ml-1 text-gray-400 font-normal normal-case"
              x-text="scanLatest.date ? '(' + scanLatest.date + ')' : ''"></span>
          </h2>
          <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-xs">
              <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-2 text-left">Ticker</th>
                  <th class="px-4 py-2 text-left">Sector</th>
                  <th class="px-4 py-2 text-right">Entry</th>
                  <th class="px-4 py-2 text-right">SL</th>
                  <th class="px-4 py-2 text-right">TP1</th>
                  <th class="px-4 py-2 text-right">RSM</th>
                  <th class="px-4 py-2 text-right">RVol</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <template x-for="(s, i) in (scanLatest.signals || [])" :key="i">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-2 font-semibold text-pink-600"
                      x-text="(s.ticker||'').replace('.BK','')"></td>
                    <td class="px-4 py-2 text-gray-500 truncate max-w-[100px]"
                      x-text="s.sector||'—'"></td>
                    <td class="px-4 py-2 text-right font-medium text-indigo-600"
                      x-text="s.bp ? '฿'+fmt2(s.bp) : '—'"></td>
                    <td class="px-4 py-2 text-right text-red-500"
                      x-text="s.sl ? '฿'+fmt2(s.sl) : '—'"></td>
                    <td class="px-4 py-2 text-right text-green-600"
                      x-text="s.tp1 ? '฿'+fmt2(s.tp1) : '—'"></td>
                    <td class="px-4 py-2 text-right"
                      :class="s.rsm >= 80 ? 'text-amber-600 font-semibold' : 'text-gray-500'"
                      x-text="s.rsm ? fmt0(s.rsm) : '—'"></td>
                    <td class="px-4 py-2 text-right"
                      :class="s.rvol >= 2 ? 'text-green-600 font-semibold' : 'text-gray-500'"
                      x-text="s.rvol ? fmt1(s.rvol)+'×' : '—'"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>

      <!-- ── Intraday alerts ───────────────────────────────────────────── -->
      <template x-if="signals.alerted_today && signals.alerted_today.length > 0">
        <div class="mt-6">
          <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
            Intraday alerts
            <span class="ml-1 text-gray-400 font-normal normal-case"
              x-text="signals.alert_date ? '(' + signals.alert_date + ')' : ''"></span>
          </h2>
          <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-xs">
              <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-2 text-left">Ticker</th>
                  <th class="px-4 py-2 text-right">Level</th>
                  <th class="px-4 py-2 text-right">Price</th>
                  <th class="px-4 py-2 text-center">Type</th>
                  <th class="px-4 py-2 text-center">Criteria</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <template x-for="(s, i) in signals.alerted_today" :key="i">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-2 font-semibold text-green-600"
                      x-text="(s.ticker||s).replace ? (s.ticker||s).replace('.BK','') : s"></td>
                    <td class="px-4 py-2 text-right"
                      x-text="s.level ? '฿'+fmt2(s.level) : '—'"></td>
                    <td class="px-4 py-2 text-right"
                      x-text="s.close ? '฿'+fmt2(s.close) : '—'"></td>
                    <td class="px-4 py-2 text-center text-gray-500"
                      x-text="s.kind||'—'"></td>
                    <td class="px-4 py-2 text-center">
                      <span :class="critBadge(s.criteria)"
                        class="px-1.5 py-0.5 rounded text-xs font-medium"
                        x-text="s.criteria||'—'"></span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>

    </div> ────────────────────────────────────────────────── -->
    <div x-show="tab === 'portfolio'">
      <template x-if="portfolio">

        <!-- Equity summary -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
            <div class="text-xs text-gray-500 mb-1">Equity</div>
            <div class="text-2xl font-bold"
              :class="portfolio.equity >= portfolio.capital ? 'text-green-600' : 'text-red-500'"
              x-text="'฿' + fmt0(portfolio.equity)"></div>
            <div class="text-xs"
              :class="portfolio.return_pct >= 0 ? 'text-green-500' : 'text-red-400'"
              x-text="(portfolio.return_pct >= 0 ? '+' : '') + portfolio.return_pct + '%'"></div>
          </div>
          <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
            <div class="text-xs text-gray-500 mb-1">Cash</div>
            <div class="text-2xl font-bold text-gray-700"
              x-text="'฿' + fmt0(portfolio.cash)"></div>
          </div>
          <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
            <div class="text-xs text-gray-500 mb-1">Open positions</div>
            <div class="text-2xl font-bold text-indigo-600"
              x-text="portfolio.open_count"></div>
          </div>
          <div class="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
            <div class="text-xs text-gray-500 mb-1">Win rate</div>
            <div class="text-2xl font-bold"
              :class="portfolio.win_rate >= 50 ? 'text-green-600' : 'text-red-500'"
              x-text="portfolio.win_rate + '%'"></div>
            <div class="text-xs text-gray-400"
              x-text="portfolio.closed_count + ' closed trades'"></div>
          </div>
        </div>

        <!-- Open positions -->
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
          Open positions
        </h2>
        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden mb-6">
          <table class="w-full text-xs">
            <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
              <tr>
                <th class="px-4 py-2 text-left">Ticker</th>
                <th class="px-4 py-2 text-right">Entry</th>
                <th class="px-4 py-2 text-right">Shares</th>
                <th class="px-4 py-2 text-right">Value</th>
                <th class="px-4 py-2 text-right">SL</th>
                <th class="px-4 py-2 text-right">TP1</th>
                <th class="px-4 py-2 text-center">Crit</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <template x-if="portfolio.open_positions.length === 0">
                <tr><td colspan="7" class="px-4 py-6 text-center text-gray-400">
                  No open positions
                </td></tr>
              </template>
              <template x-for="pos in portfolio.open_positions" :key="pos.id">
                <tr class="hover:bg-gray-50">
                  <td class="px-4 py-2 font-medium"
                    x-text="(pos.ticker_full || pos.ticker || '').replace('.BK','')"></td>
                  <td class="px-4 py-2 text-right" x-text="'฿' + fmt2(pos.entry_price)"></td>
                  <td class="px-4 py-2 text-right" x-text="pos.shares"></td>
                  <td class="px-4 py-2 text-right"
                    x-text="'฿' + fmt0(pos.entry_price * pos.shares)"></td>
                  <td class="px-4 py-2 text-right text-red-500"
                    x-text="pos.sl ? '฿' + fmt2(pos.sl) : '—'"></td>
                  <td class="px-4 py-2 text-right text-green-600"
                    x-text="pos.tp1 ? '฿' + fmt2(pos.tp1) : '—'"></td>
                  <td class="px-4 py-2 text-center">
                    <span :class="critBadge(pos.criteria)"
                      class="px-1.5 py-0.5 rounded text-xs font-medium"
                      x-text="pos.criteria || '—'"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Closed trades -->
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
          Recent closed trades
        </h2>
        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <table class="w-full text-xs">
            <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
              <tr>
                <th class="px-4 py-2 text-left">Ticker</th>
                <th class="px-4 py-2 text-right">Entry</th>
                <th class="px-4 py-2 text-right">Exit</th>
                <th class="px-4 py-2 text-right">P&L</th>
                <th class="px-4 py-2 text-center">Reason</th>
                <th class="px-4 py-2 text-right">Closed</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <template x-if="portfolio.recent_closed.length === 0">
                <tr><td colspan="6" class="px-4 py-6 text-center text-gray-400">
                  No closed trades yet
                </td></tr>
              </template>
              <template x-for="pos in portfolio.recent_closed" :key="pos.id">
                <tr class="hover:bg-gray-50">
                  <td class="px-4 py-2 font-medium"
                    x-text="(pos.ticker_full || pos.ticker || '').replace('.BK','')"></td>
                  <td class="px-4 py-2 text-right" x-text="'฿' + fmt2(pos.entry_price)"></td>
                  <td class="px-4 py-2 text-right"
                    x-text="pos.exit_price ? '฿' + fmt2(pos.exit_price) : '—'"></td>
                  <td class="px-4 py-2 text-right font-medium"
                    :class="(pos.pnl || 0) >= 0 ? 'text-green-600' : 'text-red-500'"
                    x-text="((pos.pnl||0) >= 0 ? '+' : '') + '฿' + fmt0(Math.abs(pos.pnl||0))">
                  </td>
                  <td class="px-4 py-2 text-center">
                    <span :class="reasonBadge(pos.close_reason || pos.reason)"
                      class="px-1.5 py-0.5 rounded text-xs"
                      x-text="pos.close_reason || pos.reason || '—'"></span>
                  </td>
                  <td class="px-4 py-2 text-right text-gray-400"
                    x-text="fmtDate(pos.closed_at || pos.exit_at)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

      </template>
      <template x-if="!portfolio">
        <div class="text-center py-12 text-gray-400">Loading portfolio…</div>
      </template>
    </div>

    <!-- ── SIGNALS TAB ──────────────────────────────────────────────────── -->
    <div x-show="tab === 'signals'">

      <!-- Alerted today -->
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        Triggered today
        <span class="ml-1 text-gray-400 font-normal normal-case"
          x-text="signals.alert_date ? '(' + signals.alert_date + ')' : ''"></span>
      </h2>
      <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden mb-6">
        <table class="w-full text-xs">
          <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-2 text-left">Ticker</th>
              <th class="px-4 py-2 text-right">Level</th>
              <th class="px-4 py-2 text-right">Price</th>
              <th class="px-4 py-2 text-center">Type</th>
              <th class="px-4 py-2 text-center">Criteria</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <template x-if="signals.alerted_today.length === 0">
              <tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">
                No triggers today
              </td></tr>
            </template>
            <template x-for="(s, i) in signals.alerted_today" :key="i">
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-2 font-medium"
                  x-text="(s.ticker || s).replace ? (s.ticker || s).replace('.BK','') : s"></td>
                <td class="px-4 py-2 text-right"
                  x-text="s.level ? '฿' + fmt2(s.level) : '—'"></td>
                <td class="px-4 py-2 text-right"
                  x-text="s.close ? '฿' + fmt2(s.close) : '—'"></td>
                <td class="px-4 py-2 text-center text-gray-500"
                  x-text="s.kind || '—'"></td>
                <td class="px-4 py-2 text-center">
                  <span :class="critBadge(s.criteria)"
                    class="px-1.5 py-0.5 rounded text-xs font-medium"
                    x-text="s.criteria || '—'"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Watchlist -->
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        Watchlist
        <span class="ml-1 text-gray-400 font-normal normal-case"
          x-text="signals.watchlist_date ? '(as of ' + signals.watchlist_date + ')' : ''">
        </span>
      </h2>
      <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
        <table class="w-full text-xs">
          <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-2 text-left">Ticker</th>
              <th class="px-4 py-2 text-right">Level</th>
              <th class="px-4 py-2 text-center">Type</th>
              <th class="px-4 py-2 text-center">Criteria</th>
              <th class="px-4 py-2 text-right">RVol</th>
              <th class="px-4 py-2 text-right">RSM</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <template x-if="signals.watchlist.length === 0">
              <tr><td colspan="6" class="px-4 py-6 text-center text-gray-400">
                Watchlist is empty — run EOD scan first
              </td></tr>
            </template>
            <template x-for="(s, i) in signals.watchlist" :key="i">
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-2 font-medium"
                  x-text="(s.ticker || '').replace('.BK','')"></td>
                <td class="px-4 py-2 text-right"
                  x-text="s.bp || s.level ? '฿' + fmt2(s.bp || s.level) : '—'"></td>
                <td class="px-4 py-2 text-center text-gray-500"
                  x-text="s.kind || '—'"></td>
                <td class="px-4 py-2 text-center">
                  <span :class="critBadge(s.criteria)"
                    class="px-1.5 py-0.5 rounded text-xs font-medium"
                    x-text="s.criteria || '—'"></span>
                </td>
                <td class="px-4 py-2 text-right"
                  :class="s.rvol >= 2 ? 'text-green-600' : 'text-gray-500'"
                  x-text="s.rvol ? fmt1(s.rvol) + '×' : '—'"></td>
                <td class="px-4 py-2 text-right"
                  :class="s.rsm >= 80 ? 'text-green-600' : 'text-gray-500'"
                  x-text="s.rsm ? fmt0(s.rsm) : '—'"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── BACKTEST TAB ─────────────────────────────────────────────────── -->
    <div x-show="tab === 'backtest'">
      <template x-if="!backtest">
        <div class="text-center py-12 text-gray-400">Loading backtest data…</div>
      </template>
      <template x-if="backtest">
        <div>
          <!-- Overall stats -------------------------------------------------->
          <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 text-center">
              <div class="text-2xl font-bold text-gray-800"
                x-text="backtest.overall_bt ? backtest.overall_bt.n_trades : '—'"></div>
              <div class="text-xs text-gray-400 mt-1">Total trades</div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 text-center">
              <div class="text-2xl font-bold"
                :class="backtest.overall_bt && backtest.overall_bt.wr >= 55 ? 'text-green-600' : 'text-gray-800'"
                x-text="backtest.overall_bt ? fmt1(backtest.overall_bt.wr) + '%' : '—'"></div>
              <div class="text-xs text-gray-400 mt-1">Win rate</div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 text-center">
              <div class="text-2xl font-bold"
                :class="backtest.overall_bt && backtest.overall_bt.pnl_pct >= 0 ? 'text-green-600' : 'text-red-500'"
                x-text="backtest.overall_bt ? (backtest.overall_bt.pnl_pct > 0 ? '+' : '') + fmt1(backtest.overall_bt.pnl_pct) + '%' : '—'"></div>
              <div class="text-xs text-gray-400 mt-1">Total PnL</div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 text-center">
              <div class="text-2xl font-bold text-green-600"
                x-text="backtest.overall_bt ? '+' + fmt1(backtest.overall_bt.avg_win) + '%' : '—'"></div>
              <div class="text-xs text-gray-400 mt-1">Avg win</div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 text-center">
              <div class="text-2xl font-bold text-red-500"
                x-text="backtest.overall_bt ? fmt1(backtest.overall_bt.avg_loss) + '%' : '—'"></div>
              <div class="text-xs text-gray-400 mt-1">Avg loss</div>
            </div>
          </div>

          <!-- Sort controls ------------------------------------------------->
          <div class="flex items-center gap-3 mb-3 text-xs text-gray-500">
            <span>Sort by:</span>
            <template x-for="col in [{k:'pnl_pct',l:'PnL%'},{k:'wr',l:'WR%'},{k:'trades',l:'Trades'},{k:'rsm',l:'RSM'}]" :key="col.k">
              <button @click="btSort === col.k ? btSortDir *= -1 : (btSort = col.k, btSortDir = -1)"
                :class="btSort === col.k ? 'bg-indigo-100 text-indigo-700 font-semibold' : 'hover:bg-gray-100'"
                class="px-2 py-1 rounded"
                x-text="col.l + (btSort === col.k ? (btSortDir < 0 ? ' ▼' : ' ▲') : '')"></button>
            </template>
            <span class="ml-auto text-gray-400" x-text="backtest.date ? 'as of ' + backtest.date : ''"></span>
          </div>

          <!-- Table --------------------------------------------------------->
          <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-xs">
              <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-2 text-left">Ticker</th>
                  <th class="px-4 py-2 text-left">Sector</th>
                  <th class="px-4 py-2 text-right">Trades</th>
                  <th class="px-4 py-2 text-right">WR%</th>
                  <th class="px-4 py-2 text-right">PnL%</th>
                  <th class="px-4 py-2 text-right">RSM</th>
                  <th class="px-4 py-2 text-center">Signal</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <template x-if="btSortedRows.length === 0">
                  <tr><td colspan="7" class="px-4 py-6 text-center text-gray-400">
                    No backtest data — run EOD scan first
                  </td></tr>
                </template>
                <template x-for="(r, i) in btSortedRows" :key="i">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-2 font-medium" x-text="r.ticker"></td>
                    <td class="px-4 py-2 text-gray-500 truncate max-w-[120px]" x-text="r.sector || '—'"></td>
                    <td class="px-4 py-2 text-right" x-text="r.trades"></td>
                    <td class="px-4 py-2 text-right"
                      :class="r.wr >= 55 ? 'text-green-600' : 'text-gray-600'"
                      x-text="r.trades ? fmt1(r.wr) + '%' : '—'"></td>
                    <td class="px-4 py-2 text-right font-medium"
                      :class="r.pnl_pct >= 0 ? 'text-green-600' : 'text-red-500'"
                      x-text="(r.pnl_pct > 0 ? '+' : '') + fmt1(r.pnl_pct) + '%'"></td>
                    <td class="px-4 py-2 text-right"
                      :class="r.rsm >= 80 ? 'text-indigo-600' : 'text-gray-500'"
                      x-text="fmt0(r.rsm)"></td>
                    <td class="px-4 py-2 text-center">
                      <span x-show="r.has_signal" class="px-1.5 py-0.5 rounded bg-green-100 text-green-700 font-medium">▲ Signal</span>
                      <span x-show="!r.has_signal && r.has_pending" class="px-1.5 py-0.5 rounded bg-yellow-100 text-yellow-700 font-medium">Watching</span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </div>

    <!-- ── WATCHLIST TAB ────────────────────────────────────────────────── -->
    <div x-show="tab === 'watchlist'">
      <template x-if="!watchlistDetail">
        <div class="text-center py-12 text-gray-400">Loading watchlist…</div>
      </template>
      <template x-if="watchlistDetail">
        <div>
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
              Watching <span class="text-gray-400 font-normal normal-case"
                x-text="watchlistDetail.items.length + ' stocks'"></span>
            </h2>
            <span class="text-xs text-gray-400" x-text="watchlistDetail.date ? 'as of ' + watchlistDetail.date : ''"></span>
          </div>

          <!-- TradingView copy string ---------------------------------------->
          <template x-if="watchlistDetail.copy_str">
            <div class="mb-5 bg-gray-900 rounded-lg p-3">
              <div class="flex items-center justify-between mb-1.5">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">TradingView Watchlist</span>
                <button @click="navigator.clipboard.writeText(watchlistDetail.copy_str).then(() => { $el.textContent = 'Copied!'; setTimeout(() => $el.textContent = 'Copy all', 1500); })"
                  class="text-xs px-2 py-0.5 rounded bg-indigo-600 hover:bg-indigo-500 text-white transition font-medium">
                  Copy all
                </button>
              </div>
              <div class="text-xs text-gray-300 font-mono break-all leading-relaxed select-all"
                x-text="watchlistDetail.copy_str"></div>
            </div>
          </template>

          <template x-if="watchlistDetail.items.length === 0">
            <div class="text-center py-12 text-gray-400">Watchlist is empty — run EOD scan first</div>
          </template>

          <!-- Groups by MA position ----------------------------------------->
          <template x-for="grpKey in ['>MA10', '> MA10', '> MA20', '> MA50', 'Other']" :key="grpKey">
            <template x-if="watchlistDetail.groups[grpKey] && watchlistDetail.groups[grpKey].length > 0">
              <div class="mb-6">
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 flex items-center gap-2">
                  <span class="px-2 py-0.5 rounded"
                    :class="grpKey.includes('10') ? 'bg-green-100 text-green-700' : grpKey.includes('20') ? 'bg-blue-100 text-blue-700' : grpKey.includes('50') ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'"
                    x-text="grpKey"></span>
                  <span x-text="watchlistDetail.groups[grpKey].length + ' stocks'"></span>
                </h3>
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                  <table class="w-full text-xs">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-500 uppercase tracking-wide">
                      <tr>
                        <th class="px-4 py-2 text-left">Ticker</th>
                        <th class="px-4 py-2 text-left">Sector</th>
                        <th class="px-4 py-2 text-right">Close</th>
                        <th class="px-4 py-2 text-right">RSM</th>
                        <th class="px-4 py-2 text-right">RVol</th>
                        <th class="px-4 py-2 text-right">Levels</th>
                        <th class="px-4 py-2 text-center">Copy</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                      <template x-for="(s, i) in watchlistDetail.groups[grpKey]" :key="i">
                        <tr class="hover:bg-gray-50">
                          <td class="px-4 py-2 font-medium" x-text="s.ticker"></td>
                          <td class="px-4 py-2 text-gray-500 truncate max-w-[120px]" x-text="s.sector || '—'"></td>
                          <td class="px-4 py-2 text-right" x-text="s.close ? '฿' + fmt2(s.close) : '—'"></td>
                          <td class="px-4 py-2 text-right"
                            :class="s.rsm >= 80 ? 'text-indigo-600 font-semibold' : 'text-gray-500'"
                            x-text="s.rsm ? fmt0(s.rsm) : '—'"></td>
                          <td class="px-4 py-2 text-right"
                            :class="s.rvol >= 2 ? 'text-green-600 font-semibold' : 'text-gray-500'"
                            x-text="s.rvol ? fmt1(s.rvol) + '×' : '—'"></td>
                          <td class="px-4 py-2 text-right"
                            x-text="s.levels ? s.levels.length : 0"></td>
                          <td class="px-4 py-2 text-center">
                            <button @click="navigator.clipboard.writeText((s.ticker_full || s.ticker + '.BK') + ',1D')"
                              class="text-gray-400 hover:text-indigo-600 transition"
                              title="Copy TradingView ticker">⎘</button>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>
            </template>
          </template>
        </div>
      </template>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer x-show="tab !== 'chart'" class="text-center text-xs text-gray-400 py-6">
    Breakout Signal · Paper trade mode
  </footer>

</body>
</html>
