<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout Signal</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --page:#edf0f5; --card:#fff; --bd:#d8dfe8; --bd-soft:#e6eaf0; --row:#f0f3f7;
      --head:#f7f9fb; --navy:#101e30; --ink:#1d2b3e;
      --mut:#6a7a8c; --mut2:#9aaabb; --mut3:#b0bcc8;
      --blue:#1848c8; --blue-soft:rgba(24,72,200,0.06);
      --green:#166534; --red:#9b1c1c; --amber:#b45309;
    }
    * , *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--page); color: var(--navy);
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    #root { height: 100vh; }
    .mono { font-family: 'DM Mono', monospace; font-variant-numeric: tabular-nums; }

    /* ── App shell ──────────────────────────────────────────── */
    .app { height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      height: 54px; flex-shrink: 0; background: var(--card); border-bottom: 1px solid var(--bd);
      display: flex; align-items: center; padding: 0 22px; gap: 16px; z-index: 20;
    }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.025em; color: var(--navy); display: flex; align-items: center; gap: 7px; }
    .logo .mark { color: var(--blue); font-size: 17px; }
    .topbar .set { font-size: 11.5px; color: var(--mut2); border-left: 1px solid var(--bd); padding-left: 16px; }
    .top-r { margin-left: auto; display: flex; align-items: center; gap: 11px; font-size: 11.5px; color: var(--mut); }
    .top-r .dot { width: 7px; height: 7px; border-radius: 50%; background: #198754; box-shadow: 0 0 0 3px rgba(25,135,84,0.12); }
    .top-r .dot.off { background: #9ca3af; box-shadow: 0 0 0 3px rgba(156,163,175,0.12); }
    .top-r .sep { color: var(--bd); }
    .ref-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 12px; font-size: 11.5px; font-weight: 500;
      border: 1px solid var(--bd); background: var(--card); color: var(--mut); cursor: pointer;
      border-radius: 4px; font-family: inherit; transition: all .12s;
    }
    .ref-btn:hover { background: var(--head); color: var(--ink); }
    .ref-btn.spin .ri { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .main-row { flex: 1; display: flex; min-height: 0; }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar { width: 202px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--bd); display: flex; flex-direction: column; padding: 14px 0; }
    .nav-sec { padding: 0 16px 7px; font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--mut3); font-weight: 600; }
    .nav-i {
      display: flex; align-items: center; gap: 11px; padding: 9px 18px; font-size: 12.5px; font-weight: 500;
      color: var(--mut); cursor: pointer; border-left: 2px solid transparent; transition: all .1s; user-select: none;
    }
    .nav-i:hover { color: var(--ink); background: var(--head); }
    .nav-i.act { color: var(--blue); background: var(--blue-soft); border-left-color: var(--blue); font-weight: 600; }
    .nav-ic { width: 17px; text-align: center; font-size: 14px; opacity: 0.85; }
    .nav-i.act .nav-ic { opacity: 1; }
    .nav-spacer { flex: 1; }
    .nav-foot { padding: 12px 18px 2px; border-top: 1px solid var(--bd-soft); margin-top: 8px; }
    .nav-foot .lbl { font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--mut3); font-weight: 600; margin-bottom: 9px; }
    .mini-job { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .mini-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .mini-dot.ok { background: #198754; }
    .mini-dot.rn { background: #d97706; animation: pulse 1.4s ease-in-out infinite; }
    .mini-dot.fl { background: #b91c1c; }
    .mini-dot.ny { background: #9ca3af; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .mini-lbl { flex: 1; font-size: 11px; color: var(--mut); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-t { font-size: 10px; color: var(--mut3); }

    /* ── Content area ───────────────────────────────────────── */
    .content { flex: 1; min-width: 0; overflow: auto; }
    .content.dash { display: grid; grid-template-columns: 1fr 300px; }
    .col-main { padding: 16px 16px 28px; display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    .rail { background: var(--card); border-left: 1px solid var(--bd); display: flex; flex-direction: column; overflow: auto; }
    .pad { padding: 18px 22px 32px; max-width: 1080px; width: 100%; margin: 0 auto; }

    /* ── Section headers ────────────────────────────────────── */
    .sec-h { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mut); display: flex; align-items: baseline; gap: 7px; margin: 0 0 10px; }
    .sec-h .dim { font-size: 11px; font-weight: 400; letter-spacing: 0; text-transform: none; color: var(--mut2); }

    /* ── Card ───────────────────────────────────────────────── */
    .card { background: var(--card); border: 1px solid var(--bd); border-radius: 4px; overflow: hidden; }
    .card-h { padding: 10px 16px; border-bottom: 1px solid var(--bd-soft); display: flex; align-items: center; justify-content: space-between; background: var(--head); }
    .card-t { font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mut); }
    .card-t.red { color: var(--red); }
    .card-d { font-size: 10.5px; color: var(--mut2); }

    /* ── Table ──────────────────────────────────────────────── */
    table.t { width: 100%; border-collapse: collapse; }
    .t th { text-align: left; padding: 7px 14px; color: var(--mut2); font-size: 9.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--bd-soft); background: var(--head); white-space: nowrap; }
    .t th.r { text-align: right; }
    .t th.c { text-align: center; }
    .t th.sort { cursor: pointer; user-select: none; }
    .t th.sort:hover { color: var(--blue); }
    .t td { padding: 8px 14px; border-bottom: 1px solid var(--row); font-size: 12px; white-space: nowrap; }
    .t tbody tr:last-child td { border-bottom: none; }
    .t td.r { text-align: right; }
    .t td.c { text-align: center; }
    .t td.num { text-align: right; font-family: 'DM Mono', monospace; font-size: 11px; font-variant-numeric: tabular-nums; }
    .t tbody tr:hover td { background: var(--head); }
    .t tr.broke td { background: #f0fdf4; }
    .t tr.broke:hover td { background: #e3fbe9; }
    .t tr.fk td { background: #fff8f8; }
    .empty { text-align: center; padding: 22px; color: var(--mut3); font-size: 12px; }

    .tk { font-weight: 700; color: var(--navy); cursor: pointer; font-size: 12.5px; background: none; border: none; padding: 0; font-family: inherit; }
    .tk:hover { color: var(--blue); text-decoration: underline; }
    .tk.red { color: var(--red); }
    .tk.green { color: var(--green); }
    .dm { color: var(--mut2); }
    .g { color: var(--green); font-weight: 600; }
    .r { color: var(--red); font-weight: 600; }
    .b { color: var(--blue); font-weight: 700; }

    /* criteria badges */
    .bg { display: inline-block; padding: 2px 7px; font-size: 9.5px; font-weight: 700; border-radius: 2px; letter-spacing: 0.02em; }
    .bg.P  { background: #fef3c7; color: #78350f; border: 1px solid #fcd34d; }
    .bg.RV { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .bg.RS { background: #dbeafe; color: #1e3a8a; border: 1px solid #93c5fd; }
    .bg.ST { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .bg.S5 { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    /* status badges */
    .st { display: inline-block; padding: 2px 8px; font-size: 9.5px; font-weight: 700; border-radius: 999px; letter-spacing: 0.03em; }
    .st.ok { background: #dcfce7; color: #14532d; }
    .st.fl { background: #fee2e2; color: #7f1d1d; }
    .st.rn { background: #fef3c7; color: #78350f; }
    .st.never { background: #f1f5f9; color: #64748b; }

    /* ── Right rail (dashboard) ─────────────────────────────── */
    .jcard { padding: 13px 18px; border-bottom: 1px solid var(--bd-soft); }
    .jcard-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .jcard-nm { font-size: 13px; font-weight: 600; color: var(--navy); }
    .jcard-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--mut); }
    .jcard-dur { margin-left: auto; color: var(--mut2); }
    .rail-h { padding: 11px 18px; background: var(--head); border-bottom: 1px solid var(--bd-soft); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
    .rail-h .t { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--mut); }
    .rail-h .c { font-size: 10px; color: var(--mut2); }
    .run-row { padding: 9px 18px; border-bottom: 1px solid var(--row); cursor: pointer; transition: background .1s; }
    .run-row:hover { background: var(--head); }
    .run-row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
    .run-job { font-size: 11.5px; font-weight: 600; color: var(--navy); }
    .run-meta { display: flex; align-items: center; gap: 8px; font-size: 10.5px; color: var(--mut2); }
    .run-meta .mono { font-size: 10px; }

    /* ── Backtest ───────────────────────────────────────────── */
    .bt-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 16px; }
    .bt-lbl { font-size: 11px; color: var(--mut2); font-weight: 600; }
    .pill { padding: 5px 13px; border-radius: 999px; font-size: 11.5px; font-weight: 600; border: 1px solid var(--bd); background: var(--card); color: var(--mut); cursor: pointer; font-family: inherit; transition: all .12s; }
    .pill:hover { background: var(--head); }
    .pill.on-d { background: var(--blue); color: #fff; border-color: var(--blue); }
    .pill.on-i { background: #ea580c; color: #fff; border-color: #ea580c; }
    .pill.cP.on { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .pill.cST.on { background: #dc2626; color: #fff; border-color: #dc2626; }
    .pill.cRVOL.on { background: #2563eb; color: #fff; border-color: #2563eb; }
    .pill.cRSM.on { background: #16a34a; color: #fff; border-color: #16a34a; }
    .pill.cSMA50.on { background: #d97706; color: #fff; border-color: #d97706; }
    .bt-asof { margin-left: auto; font-size: 11px; color: var(--mut2); }
    .bt-note { font-size: 11.5px; color: var(--mut); margin-bottom: 14px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 4px; padding: 8px 12px; }
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 18px; }
    .stat { background: var(--card); border: 1px solid var(--bd); border-radius: 4px; padding: 16px 14px; text-align: center; }
    .stat-v { font-size: 25px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -0.02em; }
    .stat-l { font-size: 10.5px; color: var(--mut2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    /* ── Tools ──────────────────────────────────────────────── */
    .tools-btns { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
    .btn-dark { padding: 9px 16px; border-radius: 5px; background: #0f172a; color: #fff; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: all .12s; }
    .btn-dark:hover:not(:disabled) { background: #1e293b; }
    .btn-dark:disabled { opacity: 0.45; cursor: default; }
    .jobs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .console { background: #f1f5f9; border: 1px solid var(--bd); border-radius: 6px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 11.5px; line-height: 1.7; height: 320px; overflow-y: auto; }
    .console .ln { color: #334155; white-space: pre-wrap; }
    .console .ln.err { color: #b91c1c; }
    .console .ln.muted { color: #94a3b8; }

    /* ── FAQ ────────────────────────────────────────────────── */
    .faq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .faq-card { background: var(--card); border: 1px solid var(--bd); border-radius: 4px; padding: 16px 18px; }
    .faq-q { font-size: 13.5px; font-weight: 700; color: var(--navy); margin: 0 0 9px; }
    .faq-b { font-size: 12px; color: var(--mut); line-height: 1.65; }
    .faq-b .sub { font-weight: 600; color: var(--ink); margin-top: 6px; }
    .faq-b .ghost { color: var(--mut2); }
    .faq-b code { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--head); padding: 1px 5px; border-radius: 3px; color: var(--ink); }

    /* ── Chart ──────────────────────────────────────────────── */
    .chart-wrap { height: 100%; width: 100%; }
    .chart-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .chart-placeholder { height: 100%; display: flex; align-items: center; justify-content: center; background: #0f172a; color: #64748b; flex-direction: column; gap: 14px; }
    .chart-glyph { font-size: 46px; opacity: 0.4; }
    .chart-msg { font-size: 13px; }
    .chart-tk { color: #cbd5e1; font-weight: 700; }

    /* ── Copy box (watchlist) ───────────────────────────────── */
    .copy-box { background: #f5f8ff; border: 1px solid #dce8f8; border-radius: 5px; padding: 12px 14px; margin-bottom: 18px; }
    .copy-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .copy-lbl { font-size: 10.5px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.06em; }
    .copy-btn { font-size: 11px; font-weight: 600; padding: 3px 11px; border-radius: 4px; background: var(--blue); color: #fff; border: none; cursor: pointer; font-family: inherit; transition: background .12s; }
    .copy-btn:hover { background: #1340b0; }
    .copy-str { font-family: 'DM Mono', monospace; font-size: 11px; color: #1e3a8a; word-break: break-all; line-height: 1.6; user-select: all; }
    .grp-h { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--mut); display: flex; align-items: center; gap: 9px; margin: 0 0 9px; }
    .grp-tag { padding: 2px 9px; border-radius: 3px; font-size: 10.5px; font-weight: 700; }
    .grp-tag.g10 { background: #dcfce7; color: #14532d; }
    .grp-tag.g20 { background: #dbeafe; color: #1e3a8a; }
    .grp-tag.g50 { background: #fef3c7; color: #78350f; }
    .grp-tag.go  { background: #f1f5f9; color: #475569; }
    .grp-c { font-weight: 400; color: var(--mut2); text-transform: none; letter-spacing: 0; }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-bg { position: fixed; inset: 0; z-index: 50; background: rgba(15,23,42,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--card); border-radius: 8px; box-shadow: 0 24px 60px rgba(0,0,0,0.3); width: 100%; max-width: 620px; overflow: hidden; }
    .modal-h { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--bd); }
    .modal-h .nm { font-weight: 700; font-size: 14px; color: var(--navy); }
    .modal-x { background: none; border: none; font-size: 22px; line-height: 1; color: var(--mut2); cursor: pointer; }
    .modal-x:hover { color: var(--ink); }
    .modal-b { padding: 18px 20px; }
    .kv { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12.5px; border-bottom: 1px solid var(--row); }
    .kv .k { color: var(--mut); }
    .kv .v { color: var(--navy); font-weight: 500; }
    .term-lbl { font-size: 11px; color: var(--mut); margin: 14px 0 6px; font-weight: 600; }
    .term { background: #0f172a; border-radius: 5px; padding: 12px 14px; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.65; color: #cbd5e1; white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow-y: auto; }
    .term.err { color: #fca5a5; }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast { position: fixed; top: 66px; right: 22px; z-index: 60; padding: 10px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.14); animation: toastIn .2s ease; }
    .toast.ok { background: #f0fdf4; border: 1px solid #86efac; color: #14532d; }
    .toast.err { background: #fef2f2; border: 1px solid #fca5a5; color: #7f1d1d; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-6px); } }

    .pager { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--mut); }
    .pager button { padding: 3px 9px; border: 1px solid var(--bd); background: var(--card); border-radius: 4px; cursor: pointer; color: var(--mut); font-family: inherit; }
    .pager button:hover:not(:disabled) { background: var(--head); }
    .pager button:disabled { opacity: 0.3; cursor: default; }

    /* ── Loading ──────────────────────────────────────────────── */
    .loading { text-align: center; padding: 48px; color: var(--mut3); font-size: 13px; }

    .jcard-run { margin-top: 9px; width: 100%; padding: 5px; font-size: 11px; font-weight: 600; border: 1px solid var(--bd); background: var(--card); color: var(--blue); border-radius: 4px; cursor: pointer; font-family: inherit; transition: all .1s; }
    .jcard-run:hover:not(:disabled) { background: var(--blue-soft); border-color: var(--blue); }
    .jcard-run:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/static/bs-data.jsx"></script>
  <script type="text/babel" src="/static/bs-views.jsx"></script>
  <script type="text/babel" src="/static/bs-app.jsx"></script>
</body>
</html>
